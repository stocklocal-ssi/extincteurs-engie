<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contrôle Extincteurs — Engie</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; font-size: 15px; }

  .topbar { background: #fff; border-bottom: 0.5px solid rgba(0,0,0,0.12); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .topbar-title { font-size: 16px; font-weight: 500; }
  .topbar-sub { font-size: 12px; color: #888; margin-top: 2px; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #3b6d11; display: inline-block; margin-right: 6px; }
  .sync-dot.offline { background: #e24b4a; }
  .sync-status { font-size: 12px; color: #888; display: flex; align-items: center; }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 12px 16px; }
  .stat-card { background: #fff; border-radius: 10px; padding: 10px 12px; text-align: center; border: 0.5px solid rgba(0,0,0,0.1); }
  .stat-num { font-size: 22px; font-weight: 500; line-height: 1.1; }
  .stat-num.ok { color: #3b6d11; }
  .stat-num.ko { color: #a32d2d; }
  .stat-num.pending { color: #854f0b; }
  .stat-label { font-size: 11px; color: #888; margin-top: 3px; }

  .controls { padding: 0 16px 10px; display: flex; gap: 8px; }
  .search-wrap { flex: 1; position: relative; }
  .search-wrap input { width: 100%; padding: 9px 12px 9px 34px; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px; background: #fff; font-size: 14px; color: #1a1a1a; outline: none; }
  .search-wrap input:focus { border-color: rgba(0,0,0,0.4); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 16px; color: #888; pointer-events: none; }
  .filter-btn { padding: 9px 12px; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px; background: #fff; font-size: 13px; color: #1a1a1a; cursor: pointer; white-space: nowrap; }
  .filter-btn.active { background: #eaf3de; border-color: #639922; color: #3b6d11; }

  .filter-pills { padding: 0 16px 10px; display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; }
  .filter-pills::-webkit-scrollbar { display: none; }
  .pill { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; border: 0.5px solid rgba(0,0,0,0.15); background: #fff; color: #666; }
  .pill.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

  .list { padding: 0 16px 80px; display: flex; flex-direction: column; gap: 8px; }
  .ext-card { background: #fff; border-radius: 12px; border: 0.5px solid rgba(0,0,0,0.1); padding: 14px; cursor: pointer; }
  .ext-card.status-ok { border-left: 3px solid #639922; }
  .ext-card.status-ko { border-left: 3px solid #e24b4a; }
  .ext-card.status-pending { border-left: 3px solid #ef9f27; }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .card-num { font-size: 16px; font-weight: 500; }
  .card-code { font-family: monospace; font-size: 12px; color: #888; margin-top: 2px; }
  .badge { padding: 3px 9px; border-radius: 12px; font-size: 11px; font-weight: 500; flex-shrink: 0; }
  .badge-ok { background: #eaf3de; color: #3b6d11; }
  .badge-ko { background: #fcebeb; color: #a32d2d; }
  .badge-pending { background: #faeeda; color: #854f0b; }
  .card-meta { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
  .meta-item { font-size: 12px; color: #777; }
  .card-type-badge { display: inline-block; margin-top: 6px; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 500; background: #f0f0ee; color: #555; }

  .fab { position: fixed; bottom: 24px; right: 20px; width: 52px; height: 52px; border-radius: 50%; background: #1a1a1a; color: #fff; border: none; font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 200; }

  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 300; overflow-y: auto; padding: 20px 16px; }
  .modal-bg.open { display: block; }
  .modal { background: #fff; border-radius: 16px; max-width: 480px; margin: 0 auto; overflow: hidden; }
  .modal-header { padding: 16px 16px 0; display: flex; align-items: center; justify-content: space-between; }
  .modal-header h2 { font-size: 17px; font-weight: 500; }
  .modal-close { width: 32px; height: 32px; border: none; background: #f0f0ee; border-radius: 50%; cursor: pointer; font-size: 18px; color: #1a1a1a; }
  .modal-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 13px; color: #666; font-weight: 500; }
  .field input, .field select, .field textarea { padding: 10px 12px; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px; font-size: 14px; background: #fff; color: #1a1a1a; outline: none; font-family: inherit; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: rgba(0,0,0,0.4); }
  .field textarea { resize: vertical; min-height: 70px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .status-opts { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .status-opt { padding: 9px 4px; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 8px; text-align: center; font-size: 12px; cursor: pointer; font-weight: 500; }
  .status-opt.ok { background: #eaf3de; color: #3b6d11; border-color: #c0dd97; }
  .status-opt.ko { background: #fcebeb; color: #a32d2d; border-color: #f7c1c1; }
  .status-opt.pending { background: #faeeda; color: #854f0b; border-color: #fac775; }
  .status-opt.selected { outline: 2px solid currentColor; outline-offset: 1px; }
  .modal-footer { padding: 0 16px 20px; display: flex; gap: 8px; }
  .btn-primary { flex: 1; padding: 12px; background: #1a1a1a; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .btn-danger { padding: 12px 16px; background: #fcebeb; color: #a32d2d; border: 0.5px solid #f7c1c1; border-radius: 10px; font-size: 15px; cursor: pointer; font-family: inherit; }

  .export-bar { padding: 8px 16px 0; display: flex; justify-content: flex-end; }
  .export-btn { padding: 7px 14px; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px; background: #fff; font-size: 13px; color: #666; cursor: pointer; }

  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #2c2c2a; color: #fff; padding: 10px 18px; border-radius: 20px; font-size: 13px; z-index: 400; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }

  .empty { text-align: center; padding: 48px 24px; color: #888; }
  .empty p { font-size: 14px; margin-top: 12px; }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title">🔴 Contrôle Extincteurs</div>
    <div class="topbar-sub">Engie — Campagne 2025</div>
  </div>
  <div class="sync-status" id="sync-status">
    <span class="sync-dot" id="sync-dot"></span>
    <span id="sync-text">Connexion…</span>
  </div>
</div>

<div class="stats">
  <div class="stat-card"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Total</div></div>
  <div class="stat-card"><div class="stat-num ok" id="stat-ok">—</div><div class="stat-label">Conformes</div></div>
  <div class="stat-card"><div class="stat-num ko" id="stat-ko">—</div><div class="stat-label">Non-conf.</div></div>
</div>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="N°, code, emplacement…">
  </div>
  <button class="filter-btn" id="filter-toggle" onclick="toggleFilters()">Filtres</button>
</div>

<div class="filter-pills" id="filter-pills" style="display:none">
  <span class="pill active" onclick="setFilter('all', this)">Tous</span>
  <span class="pill" onclick="setFilter('ok', this)">✅ Conformes</span>
  <span class="pill" onclick="setFilter('ko', this)">❌ Non-conf.</span>
  <span class="pill" onclick="setFilter('pending', this)">🟡 À vérifier</span>
  <span class="pill" onclick="setFilter('eau', this)">Eau</span>
  <span class="pill" onclick="setFilter('co2', this)">CO₂</span>
  <span class="pill" onclick="setFilter('poudre', this)">Poudre</span>
  <span class="pill" onclick="setFilter('mousse', this)">Mousse</span>
</div>

<div class="export-bar">
  <button class="export-btn" onclick="exportCSV()">⬇ Export CSV</button>
</div>

<div class="list" id="ext-list">
  <div class="empty"><p>Chargement…</p></div>
</div>

<button class="fab" onclick="openModal(null)" aria-label="Ajouter">＋</button>

<div class="modal-bg" id="modal-bg" onclick="handleModalBgClick(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Nouvel extincteur</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field-row">
        <div class="field">
          <label>Numéro *</label>
          <input id="f-num" type="text" placeholder="ex: EX-042">
        </div>
        <div class="field">
          <label>Code</label>
          <input id="f-code" type="text" placeholder="ex: B-RDC-04">
        </div>
      </div>
      <div class="field">
        <label>Type d'extincteur</label>
        <select id="f-type">
          <option value="">— Sélectionner —</option>
          <option value="Eau pulvérisée">Eau pulvérisée</option>
          <option value="Eau + additif">Eau + additif</option>
          <option value="CO₂">CO₂ (gaz carbonique)</option>
          <option value="Poudre ABC">Poudre ABC</option>
          <option value="Poudre BC">Poudre BC</option>
          <option value="Mousse AFFF">Mousse AFFF</option>
          <option value="Halon substitut">Halon substitut</option>
        </select>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Bâtiment / Zone</label>
          <input id="f-batiment" type="text" placeholder="ex: Bât. A">
        </div>
        <div class="field">
          <label>Étage</label>
          <input id="f-etage" type="text" placeholder="ex: RDC, R+1…">
        </div>
      </div>
      <div class="field">
        <label>Emplacement précis</label>
        <input id="f-loc" type="text" placeholder="ex: Couloir est, près ascenseur">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Date fabrication</label>
          <input id="f-fab" type="month">
        </div>
        <div class="field">
          <label>Prochaine vérif.</label>
          <input id="f-verif" type="month">
        </div>
      </div>
      <div class="field">
        <label>Capacité</label>
        <select id="f-capacite">
          <option value="">— Sélectionner —</option>
          <option>1 kg / 1 L</option>
          <option>2 kg / 2 L</option>
          <option>3 kg / 3 L</option>
          <option>6 kg / 6 L</option>
          <option>9 kg / 9 L</option>
          <option>12 kg / 12 L</option>
          <option>50 kg / 50 L</option>
        </select>
      </div>
      <div class="field">
        <label>Statut du contrôle</label>
        <div class="status-opts">
          <div class="status-opt pending selected" data-val="pending" onclick="selectStatus(this)">À vérifier</div>
          <div class="status-opt ok" data-val="ok" onclick="selectStatus(this)">Conforme ✅</div>
          <div class="status-opt ko" data-val="ko" onclick="selectStatus(this)">Non-conf. ❌</div>
        </div>
      </div>
      <div class="field">
        <label>Observations</label>
        <textarea id="f-notes" placeholder="Manomètre, étiquette, sécurité, dommages…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-danger" id="btn-delete" onclick="deleteExt()" style="display:none">🗑 Supprimer</button>
      <button class="btn-primary" onclick="saveExt()">Enregistrer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCrlzeK9hsx4riRZ38ReZdztesLj44w_yg",
    authDomain: "extincteur-e0576.firebaseapp.com",
    projectId: "extincteur-e0576",
    storageBucket: "extincteur-e0576.firebasestorage.app",
    messagingSenderId: "845121233941",
    appId: "1:845121233941:web:14eef399b05b814e4c5a1c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let allData = [];
  let currentFilter = 'all';
  let currentSearch = '';
  let editingId = null;
  let currentStatus = 'pending';

  // Sync status
  document.getElementById('sync-dot').className = 'sync-dot';
  document.getElementById('sync-text').textContent = 'Synchronisé';

  // Listen to Firestore
  const q = query(collection(db, 'extincteurs'), orderBy('num'));
  onSnapshot(q, snap => {
    allData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  }, err => {
    document.getElementById('sync-dot').className = 'sync-dot offline';
    document.getElementById('sync-text').textContent = 'Hors ligne';
    console.error(err);
  });

  function render() {
    const list = document.getElementById('ext-list');
    let data = [...allData];

    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      data = data.filter(e =>
        (e.num||'').toLowerCase().includes(q) ||
        (e.code||'').toLowerCase().includes(q) ||
        (e.loc||'').toLowerCase().includes(q) ||
        (e.batiment||'').toLowerCase().includes(q)
      );
    }

    if (currentFilter !== 'all') {
      const typeFilters = ['eau','co2','poudre','mousse'];
      if (typeFilters.includes(currentFilter)) {
        data = data.filter(e => (e.type||'').toLowerCase().includes(currentFilter === 'co2' ? 'co' : currentFilter));
      } else {
        data = data.filter(e => e.status === currentFilter);
      }
    }

    const total = allData.length;
    const ok = allData.filter(e => e.status === 'ok').length;
    const ko = allData.filter(e => e.status === 'ko').length;
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-ok').textContent = ok;
    document.getElementById('stat-ko').textContent = ko;

    if (data.length === 0) {
      list.innerHTML = '<div class="empty"><p>Aucun extincteur trouvé.<br>Appuie sur + pour en ajouter un.</p></div>';
      return;
    }

    list.innerHTML = data.map(e => `
      <div class="ext-card status-${e.status||'pending'}" onclick="window._openModal('${e.id}')">
        <div class="card-top">
          <div>
            <div class="card-num">${e.num||'—'}</div>
            <div class="card-code">${e.code||''}</div>
          </div>
          <span class="badge badge-${e.status||'pending'}">${statusLabel(e.status)}</span>
        </div>
        <div class="card-meta">
          ${e.batiment ? `<span class="meta-item">🏢 ${e.batiment}${e.etage ? ' · '+e.etage : ''}</span>` : ''}
          ${e.loc ? `<span class="meta-item">📍 ${e.loc}</span>` : ''}
          ${e.verif ? `<span class="meta-item">📅 ${fmtMonth(e.verif)}</span>` : ''}
        </div>
        ${e.type ? `<span class="card-type-badge">${e.type}${e.capacite ? ' · '+e.capacite : ''}</span>` : ''}
        ${e.notes ? `<div style="margin-top:8px;font-size:12px;color:#777;font-style:italic;padding-top:8px;border-top:0.5px solid rgba(0,0,0,0.1)">${e.notes}</div>` : ''}
      </div>
    `).join('');
  }

  function statusLabel(s) {
    return s === 'ok' ? '✅ Conforme' : s === 'ko' ? '❌ Non-conf.' : '🟡 À vérifier';
  }

  function fmtMonth(m) {
    if (!m) return '';
    const [y, mo] = m.split('-');
    const months = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
    return (months[parseInt(mo)-1]||'') + ' ' + y;
  }

  // Expose functions globally
  window._openModal = function(id) {
    editingId = id;
    const e = allData.find(x => x.id === id);
    if (!e) return;
    document.getElementById('modal-title').textContent = 'Extincteur ' + (e.num||'');
    document.getElementById('f-num').value = e.num||'';
    document.getElementById('f-code').value = e.code||'';
    document.getElementById('f-type').value = e.type||'';
    document.getElementById('f-batiment').value = e.batiment||'';
    document.getElementById('f-etage').value = e.etage||'';
    document.getElementById('f-loc').value = e.loc||'';
    document.getElementById('f-fab').value = e.fab||'';
    document.getElementById('f-verif').value = e.verif||'';
    document.getElementById('f-capacite').value = e.capacite||'';
    document.getElementById('f-notes').value = e.notes||'';
    currentStatus = e.status||'pending';
    document.getElementById('btn-delete').style.display = 'block';
    document.querySelectorAll('.status-opt').forEach(o => o.classList.toggle('selected', o.dataset.val === currentStatus));
    document.getElementById('modal-bg').classList.add('open');
  };

  window.openModal = function(id) {
    if (id) { window._openModal(id); return; }
    editingId = null;
    document.getElementById('modal-title').textContent = 'Nouvel extincteur';
    ['f-num','f-code','f-batiment','f-etage','f-loc','f-fab','f-verif','f-notes'].forEach(i => document.getElementById(i).value = '');
    document.getElementById('f-type').value = '';
    document.getElementById('f-capacite').value = '';
    currentStatus = 'pending';
    document.getElementById('btn-delete').style.display = 'none';
    document.querySelectorAll('.status-opt').forEach(o => o.classList.toggle('selected', o.dataset.val === 'pending'));
    document.getElementById('modal-bg').classList.add('open');
  };

  window.closeModal = function() {
    document.getElementById('modal-bg').classList.remove('open');
    editingId = null;
  };

  window.handleModalBgClick = function(e) {
    if (e.target === document.getElementById('modal-bg')) window.closeModal();
  };

  window.selectStatus = function(el) {
    currentStatus = el.dataset.val;
    document.querySelectorAll('.status-opt').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
  };

  window.saveExt = async function() {
    const num = document.getElementById('f-num').value.trim();
    if (!num) { showToast('Le numéro est requis'); return; }
    const data = {
      num,
      code: document.getElementById('f-code').value.trim(),
      type: document.getElementById('f-type').value,
      batiment: document.getElementById('f-batiment').value.trim(),
      etage: document.getElementById('f-etage').value.trim(),
      loc: document.getElementById('f-loc').value.trim(),
      fab: document.getElementById('f-fab').value,
      verif: document.getElementById('f-verif').value,
      capacite: document.getElementById('f-capacite').value,
      status: currentStatus,
      notes: document.getElementById('f-notes').value.trim(),
      updatedAt: serverTimestamp()
    };
    try {
      if (editingId) {
        await updateDoc(doc(db, 'extincteurs', editingId), data);
        showToast('Extincteur mis à jour ✅');
      } else {
        await addDoc(collection(db, 'extincteurs'), { ...data, createdAt: serverTimestamp() });
        showToast('Extincteur ajouté ✅');
      }
      window.closeModal();
    } catch(err) {
      showToast('Erreur : ' + err.message);
      console.error(err);
    }
  };

  window.deleteExt = async function() {
    if (!editingId) return;
    if (!confirm('Supprimer cet extincteur ?')) return;
    try {
      await deleteDoc(doc(db, 'extincteurs', editingId));
      window.closeModal();
      showToast('Extincteur supprimé');
    } catch(err) {
      showToast('Erreur : ' + err.message);
    }
  };

  window.setFilter = function(f, el) {
    currentFilter = f;
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    render();
  };

  window.toggleFilters = function() {
    const el = document.getElementById('filter-pills');
    const show = el.style.display === 'none';
    el.style.display = show ? 'flex' : 'none';
    document.getElementById('filter-toggle').classList.toggle('active', show);
  };

  window.exportCSV = function() {
    const cols = ['num','code','type','batiment','etage','loc','fab','verif','capacite','status','notes'];
    const headers = ['Numéro','Code','Type','Bâtiment','Étage','Emplacement','Fabrication','Prochaine vérif.','Capacité','Statut','Observations'];
    const rows = allData.map(e => cols.map(c => '"' + (e[c]||'').toString().replace(/"/g,'""') + '"').join(','));
    const csv = [headers.join(','), ...rows].join('\n');
    const blob = new Blob(['\uFEFF'+csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'extincteurs_' + new Date().toISOString().slice(0,10) + '.csv';
    a.click(); URL.revokeObjectURL(url);
    showToast('Export CSV téléchargé');
  };

  document.getElementById('search-input').addEventListener('input', e => {
    currentSearch = e.target.value;
    render();
  });

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
